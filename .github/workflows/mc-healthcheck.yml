name: Minecraft Server Health Check

on:
  schedule:
    # 每 10 分鐘自動執行一次
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install mcstatus
        run: pip install mcstatus

      - name: Check Minecraft Server Status
        run: |
          # 如果 ping 失敗，GitHub Actions 就會判定此任務失敗，並自動觸發 GitHub 的 Email 通知
          python -m mcstatus mcnihaoamiao.ddns.net ping
