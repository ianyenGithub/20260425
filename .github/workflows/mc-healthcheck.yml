name: Minecraft Server Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Minecraft Server Status
        # 使用 Linux 內建的 nc 檢測 25565 埠口，連線超時設定為 5 秒
        run: |
          if nc -z -w 5 mcnihaoamiao.ddns.net 25565; then
            echo "伺服器在線"
          else
            echo "伺服器離線"
            exit 1
          fi

      - name: Update Last Check Time in README
        if: ${{ always() }} 
        run: |
          CURRENT_TIME=$(TZ="Asia/Taipei" date +"%Y-%m-%d %H:%M:%S (CST)")
          sed -i "s|<!-- LAST_UPDATE_START -->.*<!-- LAST_UPDATE_END -->|<!-- LAST_UPDATE_START -->\`$CURRENT_TIME\`<!-- LAST_UPDATE_END -->|g" README.md

      - name: Commit and Push Changes
        if: ${{ always() }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自動更新檢測時間 [skip ci]" && git push)
